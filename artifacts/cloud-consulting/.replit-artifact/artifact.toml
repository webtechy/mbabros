kind = "web"
previewPath = "/"
title = "Cloud Consulting"
version = "1.0.0"
id = "artifacts/cloud-consulting"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19868

[services.development]
run = "pnpm --filter @workspace/cloud-consulting run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cloud-consulting", "run", "build" ]
publicDir = "artifacts/cloud-consulting/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19868"
BASE_PATH = "/"
